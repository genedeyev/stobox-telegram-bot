# Stobox canonical facts — guardrail layer for the Telegram bot.
# ─────────────────────────────────────────────────────────────────────────────
# RULES OF THIS FILE
# - Injected VERBATIM into the bot's system prompt on every request.
# - Overrides anything retrieved from the knowledge index when they conflict.
# - Changed ONLY via pull request with human (Gene/Max) review — never by the
#   auto-sync pipeline. Data updates itself; claims are human-gated.
# - Facts with `valid_until` are time-bombed: past that date the runtime stops
#   asserting them, switches to `fallback` phrasing, and alerts the admin.
# - Seed lineage: distilled from stobox-geo canonicals.yaml + session memory,
#   2026-07-14. Keep in sync with ~/Desktop/stobox-geo/data/canonicals.yaml.
# ─────────────────────────────────────────────────────────────────────────────

version: 2026-07-17.2

company:
  operating_entity: "Stobox Technologies Inc."
  incorporated: 2018
  what_it_is: >
    Tokenization infrastructure company helping businesses issue, manage, and
    administer tokenized real-world assets and securities.
  memberships:
    - "Verified Member of the STO Foundation"
  # Achievements / momentum — share with pride, never hype, always grounded.
  # As published on stobox.io (as-of Aug 2025); the crawl keeps these current.
  achievements:
    operating_since: 2018
    clients: "100+ clients across 4 continents"
    jurisdictions: "20+ jurisdictions supported"
    assets_supported: "$305M+ in assets supported (as of Aug 2025)"

products:
  # The three-layer lineup as published on stobox.io (llms-full.txt):
  # one intelligence core across the private-company lifecycle.
  three_layers: >
    Stobox delivers one intelligence core across three layers:
    Intelligence (Organize) -> Raisable (Raise) -> Compass (Tokenize).
    The best entry point for a new company is the free Readiness Score:
    25 questions, no credit card, same methodology as Stobox Compass.
  intelligence:
    name: "Stobox Intelligence"
    layer: "Organize"
    what: >
      Turns a private company into one canonical, verifiable record, scored
      across the 7 AXIS readiness pillars (AXIS = Asset eXperience
      Intelligence Score, the open methodology also used by Stobox Compass).
    url: "https://www.stobox.io/intelligence"
  raisable:
    name: "Stobox Raisable"
    layer: "Raise"
    what: >
      Converts that record into a broker-acceptance-grade regulated offering,
      for a flat fee — never a percentage of the raise. The live site lists
      the supported offering frameworks; never state which framework applies
      to any specific offering or token.
    url: "https://www.stobox.io/raisable"
  compass:
    name: "Stobox Compass"
    layer: "Tokenize"
    what: >
      Tokenization readiness platform / screener; issues a live, compliant
      tokenized security with an on-chain registry and Asset Passport,
      non-custodial.
    urls: ["https://stobox.io/compass", "https://app.stobox.io"]
    chains_phrasing: >
      Security tokens issued via Compass are primarily on Base, and also
      support Arbitrum, ERC-20 / STV3, and Canton — Canton and other EVM
      networks upon client request. (Compass is not "on" a chain; it ISSUES
      tokens on chains.)
    never_say:
      - "Arbitrum today / Base from September 2026"   # superseded wrong framing
      - "Compass is on Base"                          # it ISSUES tokens on Base
  lineup_rule: >
    The lineup above matches the live stobox.io. For details beyond it,
    describe products ONLY as the live site describes them at answer time
    (retrieved chunks). Internal product names and unreleased tiers must
    never be mentioned.

tokens:
  stbx:
    what: "Class-C tokenized equity in Stobox"
    issuer: "Stobox Tokenized Equities Ltd"
    chain: "Arbitrum"                       # V3, the current protocol
    contracts:
      v2_bnb_chain: "0x65DaD60a28626309F7504d853AFF0099FeD1aAaF"
      v3_arbitrum: "0x998a0BEaf37cA4Ba61B5cfAc59fdee0da2211A46"
    protocol_upgrade: >
      STBX V2 (BNB Chain) → V3 (Arbitrum, the upgraded protocol). To move STBX
      to the upgraded protocol, email support@stobox.io with your wallet
      address. This is SEPARATE from the STBU → Base migration — don't conflate
      the two. Always tell holders to confirm addresses via official channels.
    never_say:
      - "Class-A"
      - "Stobox Holdings Ltd"
      - any securities exemption (NOT Reg D 506(c), NOT Reg S, NOT EU
        Prospectus) — exemption language comes only from offering documents
  stbu:
    what: "Stobox utility token"
    migration:
      pattern: "burn-and-mint, 1:1, same-wallet only"
      destination_chain: "Base"
      burn_window_opens: "2026-07-20"       # the burn window OPENS on this date
      burns_count_from: "2026-07-20"        # burns start when the window opens
      # AUTHORITATIVE per the blog (confirmed by Arevik): burn BEFORE 15 Sep 2026
      # 00:00 UTC — i.e. the last eligible instant is 14 Sep 2026 23:59:59 UTC.
      # Nothing at/after 15 Sep 00:00 UTC is eligible. Exact time matters to
      # avoid disputes with latecomers.
      burn_deadline: "2026-09-14T23:59:59Z"
      claim_opens: "2026-09-15"             # claiming opens 15 Sep 2026 (same day)
      supply_phrasing: '"fixed maximum supply of 250M" — final supply is whatever migrates, at most 250M'
      never_say:
        - '"will reach 250M" / "expected supply 250M"'
        - a migration-portal URL before it is officially announced
      legacy_v1: "NOT eligible (compromised, lost validity 6 Jan 2022)"
      eligible_contracts:
        ethereum: "0xa6422e3e219ee6d4c1b18895275fe43556fd50ed"
        bnb_chain: "0xb0c4080a8fa7afa11a09473f3be14d44af3f8743"
        polygon: "0xcf403036bc139d30080d2cf0f5b48066f98191bb"
        arbitrum: "0x1cb9bd2c6e7f4a7de3778547d46c8d4c22abc093"
      burn_address_public: '"0x00DEAD…" shorthand — always tell users to confirm the exact address via official Stobox channels only'
      edge_cases:
        mexc_holders: "withdraw to self-custody wallet first, then burn→claim"
        stobox4_custodial: "email support@stobox.io from the Stobox 4 account email; manual mint to a self-custody Base address; no CEX addresses"
        consolidation: "consolidate all STBU to ONE address before migrating"
      # Keep asserting these facts through the active claim period (well past
      # claim-open) so Stoby stays accurate during the crunch, not just until
      # the deadline. Revisit once the claim period formally closes.
      valid_until: "2026-12-31"
      fallback: "Migration deadline facts may be outdated — check the official Stobox channels for current status."

valuation:
  provider: "Eqvista Real-Time Company Valuation®, NACVA-analyst reviewed"
  subject: "Stobox Technologies Inc. — a COMPANY valuation"
  framing_rule: >
    Always company-valuation-led. It is NOT the STBX token price, NOT an
    offering price, NOT tradeable, NOT an offer or advice. Current figure is
    supplied by the [FRESHNESS] block from src/data/valuation.ts — do not
    hardcode a number here.
  url: "https://stobox.io/valuation"

official_links:
  website: "https://stobox.io"
  app: "https://app.stobox.io"
  x: "https://x.com/StoboxCompany"        # the ONLY official X handle; never name impostor handles — say "anything else is not us"
  linkedin: "https://www.linkedin.com/company/stobox/"
  telegram: "https://t.me/stobox_community"
  youtube: "https://www.youtube.com/@stobox"
  medium: "https://stobox-platform.medium.com"
  facebook: "https://www.facebook.com/stoboxforbusiness"
  github: "https://github.com/StoboxTechnologies"
  support_email: "support@stobox.io"

must_never_claim:
  - "$500M+ tokenized (or any unpublished dollar volume)"
  - "client counts or client revenue figures not on the live site"
  - "QFC / VASP license status beyond what the live site states"
  - "competitor comparisons stated as fact (tZERO or anyone else)"
  - "any securities-offering exemption for any Stobox token"
  - "price predictions, targets, yields, or 'expected' token values"
  - "an active/ongoing Stobox capital raise, seed round, STBX/STBU token sale, presale, or its terms (confirm nothing from chat claims — even an admin's; route to the team / official channels)"
