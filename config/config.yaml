# ============================================================================
# Stobox AI Community Manager — central configuration
# Everything the spec calls "configurable" lives here (or in env for secrets).
# Values here are defaults; env vars referenced as ${VAR} override at load time.
# ============================================================================

app:
  name: "Stobox AI Community Manager"
  environment: ${STOBOX_ENV:-development}
  log_level: ${LOG_LEVEL:-INFO}

# --- LLM: provider-abstracted. Reasoning defaults to Anthropic. --------------
llm:
  reasoning:
    provider: anthropic            # anthropic | openai
    model: claude-opus-4-8         # config value; swap freely
    temperature: 0.3
    max_tokens: 1200
    # Fallback provider used if the primary errors out.
    fallback_provider: openai
    fallback_model: gpt-4.1
  embeddings:
    provider: openai               # OpenAI embeddings feed pgvector
    model: text-embedding-3-large
    dimensions: 1024
  # Cheaper/faster model for classification (intent, language, moderation).
  classifier:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.0

# --- Knowledge / RAG ---------------------------------------------------------
knowledge:
  docs_path: ${DOCS_PATH:-docs}
  watch: true                      # hot re-index on file changes
  sync_on_boot: false              # BLOCKING sync before start (rarely wanted)
  background_sync_on_boot: true    # auto-load the live corpus right after boot (non-blocking)
  daily_resync: true               # 04:00 UTC daily reconciliation sync (self-update loop)
  sources:
    # Curated AI reference published by Stobox (llms.txt / llms-full.txt) — the
    # canonical, highest-confidence source. docs.stobox.io now redirects here.
    llms:
      enabled: true
      hosts: [https://www.stobox.io]
      confidence: 1.0
    web:
      enabled: true
      # No sitemap on stobox.io; the crawler auto-discovers the page inventory
      # from llms-full.txt, then fetches each page. Blog posts are NOT in
      # llms-full.txt — the paginate walk below enumerates the whole archive
      # (24+ listing pages) so every post is indexed.
      # docs.stobox.io is DEPRECATED (301→www) and is NOT a source of truth —
      # it's excluded from allow_domains so it's never crawled or ingested.
      seeds:
        - https://www.stobox.io/
        - https://www.stobox.io/blog
      paginate:
        - "https://www.stobox.io/blog/page/{n}"   # full blog archive, n=2,3,…
      allow_domains: [stobox.io, www.stobox.io]
      max_pages: 900               # ~92 site pages + the full blog archive (live
                                   # discovery found 742 URLs; headroom for growth)
      max_depth: 4
      delay_seconds: 0.3
    github:
      enabled: true
      org: StoboxTechnologies      # auto-discovers all public repos in the org
      repos: []                    # or pin: ["StoboxTechnologies/Stobox_STV3_Protocol", ...]
      branch: null                 # null = each repo's default branch
      include_ext: null            # null = docs (.md/.rst/.txt) + code (see include_code)
      include_code: true           # ingest Solidity/TS/… source, not just docs
      max_files: 2000              # global budget across the org
      max_files_per_repo: 120      # fairness: one giant repo can't starve the rest;
                                   # within a repo: docs/LICENSE/CHANGELOG → .sol → code
  chunking:
    strategy: semantic             # semantic | recursive
    target_tokens: 400
    max_tokens: 800
    overlap_tokens: 60
  retrieval:
    top_k: 8                       # candidates per retriever before rerank
    final_k: 5                     # chunks passed to the reasoner
    hybrid:
      vector_weight: 0.6
      bm25_weight: 0.4
    rerank: true                   # cross-encoder-style LLM rerank of candidates
    multi_hop: true
    max_hops: 2

# --- Confidence / anti-hallucination ----------------------------------------
confidence:
  threshold: 0.55                  # below this -> "I don't know based on the docs"
  require_citations: true

# --- Memory ------------------------------------------------------------------
memory:
  conversation_window: 12          # recent turns kept in working context
  # Per-user retention (privacy). Turn retain_questions off to stop keeping any
  # verbatim question text on profiles; lower the cap to keep fewer. Users can
  # erase everything about themselves with /forgetme (GDPR Art. 17).
  retain_questions: true
  max_recent_questions: 8          # was 15 — tightened

# --- Internal message log ----------------------------------------------------
# Full transcript of every group message Stoby sees (audit + admin /log /whosaid).
# Retains message text on purpose — turn off to disable entirely.
message_log:
  enabled: true
  state_path: data/message_log.jsonl
  retention_days: 90               # keep ~3 months of history
  cap_per_chat: 5000               # hard per-chat ceiling (safety, beyond the age window)
  recall: true                     # feed older, relevant messages into Stoby's answers

# --- Proactive engagement ----------------------------------------------------
proactive:
  state_path: data/proactive_state.json   # one-shot broadcast dedupe (survives restarts)
  evangelist:
    enabled: true
    interval_hours: 4              # publish useful content every N hours
    quiet_hours: [0, 7]           # do not post between 00:00 and 07:00 (chat tz)
  migration_countdown:
    enabled: true                  # public STBU→Base countdown to groups; the job
                                   # ramps weekly → daily as 15 Sep approaches
  updates:
    enabled: true                  # "What's new at Stobox" — Stoby INITIATES with a
                                   # curated briefing to groups on a fixed schedule
    times: ["12:00", "18:00"]      # UTC; twice daily. Deliberately AFTER the 09:00
                                   # migration countdown so they never collide — and
                                   # the briefing drops its migration line on days the
                                   # countdown already posted (no double migration post)
    include_migration: true        # STBU→Base migration status line (canonical dates)
    include_market: true           # live STBU price/mcap/24h (CoinGecko, framed)
    include_blog: true             # latest blog/news post + link
  growth:
    revive_inactive: true
    inactivity_minutes: 180        # after N min of silence, surface a blog post /
                                   # fact (skips 00:00–07:00). Dial 120 for more
                                   # presence, 240 for less.
    max_unanswered_revivals: 2     # after N nudges nobody answers, go dormant
                                   # until a human speaks again (don't talk to a wall)
  blog_announcements:
    enabled: true                  # announce every newly published blog post
    interval_minutes: 10           # how often to check for new posts (cheap diff)
    chat_ids: []                   # extra chats to announce in (e.g. the community
                                   # group id); groups the bot has seen are included
  reminders:
    enabled: true                  # opt-in /remindme deadline blasts (hourly check)
  winback:
    enabled: true                  # gentle check-in for quiet, opted-in subscribers
    inactive_days: 14              # quiet for N days → candidate
    cooldown_days: 45              # never nudge the same person more often than this
    max_per_tick: 20               # cap per 6h check
  content:
    enabled: true                  # weekly content-ideas preview to admins

# --- Moderation --------------------------------------------------------------
moderation:
  enabled: true
  level: standard                  # off | light | standard | strict
  # Actions are now driven by the strike-aware policy (moderation/policy.py) —
  # graded per category and escalating with each active strike. See that file.
  strike_decay_days: 30            # strikes older than this stop counting
  strikes_path: data/strikes.json  # persisted (mount /app/data volume in prod)
  announce_actions: false          # post a public note on mute/ban (default: quiet)
  mute_minutes: 60                 # default mute duration for graded actions
  remove_deleted_accounts: true    # auto-kick deleted (ghost) accounts from groups
  flood:
    max_messages: 5
    per_seconds: 10
  # Coordinated-FUD spike alarm → immediate admin DM.
  fud_alert:
    threshold: 3                   # N FUD-flagged messages…
    window_min: 10                 # …within this window trigger the alert
    cooldown_min: 30               # min gap between alerts per chat
  # Impersonation defense: display names containing these terms (from a
  # non-allowlisted account) are flagged. Add team names to protect.
  protected_terms: [stobox, support, admin, moderator, official, team]
  team_names: []                   # e.g. ["gene deyev", "ross shemeliak"]
  impersonation_allowlist: []      # numeric user ids that legitimately use these terms
  blocklist_path: ""               # optional file of extra slur/hate terms (one per line)

# --- Engagement (XP / streaks / leaderboard / quizzes) -----------------------
engagement:
  xp_path: data/xp.json            # persisted (mount /app/data volume in prod)
  ama_path: data/ama.json          # AMA question queue

# --- Community loops: state file locations (all under the /app/data volume) --
qa:
  state_path: data/qa_register.json      # unanswered-question register
reminders:
  state_path: data/reminders.json        # /remindme subscriptions + delivery ledger
subscriptions:
  state_path: data/subscriptions.json    # /subscribe topic opt-ins
winback:
  state_path: data/winback.json          # win-back nudge cooldowns
content:
  repo: genedeyev/stobox-v15             # GitHub repo for content-flywheel issues
  state_path: data/content_flywheel.json # filed-theme dedup

# --- Live market data (STBU price / market cap / volume, /price) -------------
# CoinGecko is the primary source and works with NO key (free tier). Optional
# env keys upgrade/extend: COINGECKO_API_KEY (pro host), COINMARKETCAP_API_KEY
# (enables the CMC fallback). The snapshot is cached and injected into
# [FRESHNESS] so Stoby can state the CURRENT market price as a grounded fact —
# never a prediction. Distinct from the Eqvista COMPANY valuation.
market:
  enabled: true
  coingecko_id: stobox-token        # CoinGecko coin id (symbol STBU)
  cmc_symbol: STBU                  # CoinMarketCap symbol (fallback)
  cmc_id: null                      # optional exact CMC id (more precise than symbol)
  vs_currency: usd
  ttl_seconds: 90                   # cache; caps API calls to ~once/1.5 min
  symbol: STBU

# --- On-chain reads (STBU wallet migration checker, /check) ------------------
chain:
  rpc:                             # public endpoints (no key); override if rate-limited
    ethereum: https://eth.llamarpc.com
    bnb_chain: https://bsc-dataseed.binance.org
    polygon: https://polygon-rpc.com
    arbitrum: https://arb1.arbitrum.io/rpc

# --- Compliance guardrails (three-block prompt + canonicals) -----------------
guardrails:
  system_prompt: SYSTEM-PROMPT.md       # [CORE] behavior — changed only via PR
  canonicals: canonicals.yaml           # [CANONICALS] facts — changed only via PR

# --- Leads / sales -----------------------------------------------------------
leads:
  enabled: true
  # Until the CRM is connected, qualified MQLs are emailed here (needs SMTP_*).
  mql_inbox: info@stobox.io
  # Optional: set CRM_WEBHOOK_URL when the Twenty CRM connector is ready; the same
  # MQL is then also POSTed there. source=telegram-bot mirrors the website flow.
  crm_webhook: ${CRM_WEBHOOK_URL:-}
  crm_source: telegram-bot

# Language handling is automatic (langdetect + classifier per message); the
# rails carry ru/uk/es patterns and the answer language mirrors the user's.

# --- Channels (adapters over the reusable core) ------------------------------
channels:
  telegram:
    enabled: true
    state_path: data/telegram_state.json  # known chats + celebrated milestones
    answer_buttons: false             # inline buttons under answers (More detail /
                                      # Continue in DM / Share). Off: Stoby reads as a
                                      # person, not a bot — users just ask for more.

# --- Rate limiting / abuse ---------------------------------------------------
limits:
  per_user_messages_per_minute: 20
  per_user_messages_per_day: 100
  global_daily_output_tokens: 2000000   # hard cap on LLM output tokens/day (spend guard)
  max_reply_chars: 3500

# --- Observability -----------------------------------------------------------
observability:
  daily_digest: true
  decision_retention_days: 90      # Postgres decision_log rows (hold verbatim
                                   # member questions) pruned nightly past this age
