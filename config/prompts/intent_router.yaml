id: intent_router
description: One cheap classifier call that routes a message (mode, persona, language, intent).
active: v1
versions:
  v1:
    weight: 1
    template: |
      Classify the user's message for a Stobox community bot. Return ONLY minified
      JSON with this exact shape:
      {{"mode":"community_manager|technical_expert|sales_assistant|moderator|small_talk",
        "persona":"developer|investor|founder|lawyer|enterprise|retail|beginner|journalist|partner|regulator|unknown",
        "language":"ISO 639-1 code",
        "buying_intent":true|false,
        "is_question":true|false,
        "topics":["short topic tags"],
        "needs_docs":true|false}}

      Guidance:
      - buying_intent=true when they ask about pricing, demos, onboarding, using
        Stobox for their asset/company, or "how do I get started" commercially.
      - needs_docs=true for any factual/product/technical/legal/pricing question.
      - mode=moderator only for spam/scam/abuse; otherwise pick a helpful mode.
      - Infer persona from wording; use "unknown" if unclear.

      Message: {text}
      Reply-to (if any): {reply_to}
