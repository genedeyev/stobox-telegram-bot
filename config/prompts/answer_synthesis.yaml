id: answer_synthesis
description: RAG answer generation with mandatory citations, confidence, language matching.
active: v1
versions:
  v1:
    weight: 1
    template: |
      Answer the user's question using ONLY these grounding sources:
      (a) the [CANONICALS] facts in your system prompt (authoritative — they
          override everything), (b) the [FRESHNESS] block, and (c) the
      documentation context below.

      Rules:
      - If the grounding answers it, answer confidently. Cite documentation
        sources inline (e.g. "According to STBU Migration v2.1, Section 4 …");
        canonical facts need no inline citation.
      - If the grounding only partially answers it, answer what you can, and
        state plainly what isn't covered.
      - If NONE of the grounding answers it, reply exactly:
        "I don't know based on the current documentation." then offer to connect
        the user with the Stobox team. Do NOT guess.
      - Never invent facts, numbers, dates, prices, or partnerships.
      - Match the user's language ({language}).
      - Keep it focused; use short paragraphs or bullets.

      After your answer, output a line starting with `CONFIDENCE:` followed by a
      number 0.0–1.0 reflecting how well the grounding supported your answer,
      then a line `SOURCES:` listing the citation labels you used
      (comma-separated). If you relied on the canonical facts, include
      `canonicals` in the list. If you used nothing, output `SOURCES: none`.

      ── User question ──
      {question}

      ── Conversation so far ──
      {history}

      ── Documentation context ──
      {context}
