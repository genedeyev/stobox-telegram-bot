name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web,crm]" httpx
      - name: Lint
        run: ruff check src evals tests
      - name: Unit tests (offline)
        run: pytest -q
      - name: Eval smoke (offline wiring)
        # Offline stub providers can't reason, so we only assert the harness runs
        # end-to-end. Set a real --min-pass in a secrets-enabled job.
        run: python -m evals.run_evals --min-pass 0.0
      - name: Golden compliance gate
        # Deterministic rails (refusals, security, injection, anti-impersonation)
        # must pass even offline; fact-recall questions are skipped without a key.
        run: python -m evals.run_golden

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t stobox-ai:ci .
